<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced 3D Game Art — Workshop</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242837;
    --accent: #7c6af7;
    --accent2: #f7956a;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --good: #5dd4a4;
    --warn: #f7c56a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border-bottom: 1px solid #2a2d3e;
    padding: 0 24px;
    height: 52px;
    flex-shrink: 0;
    z-index: 100;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
  #slide-counter { font-size: 13px; color: var(--muted); }
  #progress-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); transition: width .3s; }

  /* LAYOUT */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid #2a2d3e;
    overflow-y: auto;
    padding: 12px 0;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 2px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--muted);
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
  .nav-num { font-size: 11px; width: 18px; text-align: center; opacity: .6; }

  /* MAIN CONTENT */
  #content { flex: 1; overflow: hidden; position: relative; }
  .slide {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 48px 64px;
    display: none;
    animation: fadeIn .2s ease;
  }
  .slide.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .slide::-webkit-scrollbar { width: 5px; }
  .slide::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 3px; }

  /* SLIDE CONTENT */
  .slide-header { margin-bottom: 40px; }
  .slide-num { font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .slide-title { font-size: 42px; font-weight: 700; line-height: 1.1; }
  .slide-subtitle { font-size: 16px; color: var(--muted); margin-top: 10px; }

  .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 32px; }
  .topic-card {
    background: var(--surface);
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    padding: 24px;
    transition: border-color .2s;
  }
  .topic-card:hover { border-color: var(--accent); }
  .topic-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .topic-card p { font-size: 13.5px; color: var(--muted); line-height: 1.6; }
  .topic-icon { font-size: 20px; }

  .tip-box {
    background: linear-gradient(135deg, #1e1a3a, #1a2030);
    border: 1px solid #3a3260;
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 24px;
    font-size: 13.5px;
    color: #b8b4e8;
    line-height: 1.6;
  }
  .tip-box strong { color: var(--accent); }

  .warn-box {
    background: linear-gradient(135deg, #2a1e10, #201818);
    border: 1px solid #5a3a20;
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 16px;
    font-size: 13.5px;
    color: #d4b090;
    line-height: 1.6;
  }
  .warn-box strong { color: var(--warn); }

  .good-box {
    background: linear-gradient(135deg, #0e2a20, #0a1e18);
    border: 1px solid #1a5a40;
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 16px;
    font-size: 13.5px;
    color: #90d4b8;
    line-height: 1.6;
  }
  .good-box strong { color: var(--good); }

  .new-tag {
    display: inline-block;
    background: #f7956a22;
    border: 1px solid #f7956a55;
    color: var(--accent2);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 1px 7px;
    border-radius: 4px;
    vertical-align: middle;
    margin-left: 6px;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 32px; }
  .two-col-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-top: 32px; }
  @media (max-width: 900px) { .two-col, .two-col-3 { grid-template-columns: 1fr; } }

  .diagram { margin-top: 28px; display: flex; justify-content: center; }
  svg text { font-family: 'Segoe UI', sans-serif; }

  h2.section-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--accent2);
    margin: 36px 0 16px;
  }
  ul.checklist { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  ul.checklist li { display: flex; gap: 12px; font-size: 14px; color: var(--muted); align-items: flex-start; }
  ul.checklist li::before { content: '▸'; color: var(--accent); flex-shrink: 0; }
  ul.checklist li strong { color: var(--text); }

  .score-scale {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .score-item {
    background: var(--surface);
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 14px 18px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }
  .score-num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .score-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* NAV BUTTONS */
  #nav-btns {
    position: fixed;
    bottom: 28px;
    right: 32px;
    display: flex;
    gap: 10px;
    z-index: 200;
  }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid #3a3d5e;
    color: var(--text);
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); }

  /* HOME SLIDE */
  .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 70vh;
  }
  .hero .big-title { font-size: 60px; font-weight: 800; line-height: 1.05; }
  .hero .big-title span { color: var(--accent); }
  .hero .desc { font-size: 18px; color: var(--muted); margin-top: 20px; max-width: 600px; line-height: 1.6; }
  .topic-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 36px; }
  .pill {
    background: var(--surface);
    border: 1px solid #2a2d3e;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }

  kbd {
    background: var(--surface2);
    border: 1px solid #3a3d5e;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 12px;
    color: var(--muted);
    font-family: monospace;
  }
  .key-hint { font-size: 12px; color: var(--muted); margin-top: 16px; }
</style>
</head>
<body>

<div id="topbar" style="position:relative">
  <h1>Advanced 3D Game Art — Workshop</h1>
  <span id="slide-counter">1 / 16</span>
  <div id="progress-bar"></div>
</div>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="content"></main>
</div>

<div id="nav-btns">
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Prev</button>
  <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
</div>

<script>
const slides = [

  // 0 — HOME
  {
    nav: 'Overview',
    icon: '🏠',
    html: `
    <div class="hero">
      <div class="slide-num">Advanced 3D Game Art</div>
      <div class="big-title">3D Artist<br><span>Self-Assessment</span><br>Workshop</div>
      <p class="desc">Go through each skill area, discuss examples, and honestly rate yourself. This gives you a clear picture of where you stand and what to focus on next.</p>
      <div class="topic-pills">
        ${['Modelling','Sculpting','UV Unwrapping','Texturing (PBR)','Baking','Game Engine','Optimization','Presentation','Portfolio Quality','Design Thinking','Reference Analysis','Pipeline','Organization','Problem Solving','Self-Directed Learning'].map((t,i)=>`<div class="pill" onclick="goTo(${i+1})">${i+1}. ${t}</div>`).join('')}
      </div>
      <p class="key-hint" style="margin-top:28px">Navigate: <kbd>←</kbd> <kbd>→</kbd> arrow keys &nbsp;|&nbsp; Click any topic above to jump directly</p>
    </div>`
  },

  // 1 — MODELLING
  {
    nav: 'Modelling',
    icon: '📐',
    html: `
    <div class="slide-header">
      <div class="slide-num">01 — Modelling</div>
      <div class="slide-title">Modelling</div>
      <div class="slide-subtitle">The foundation of every asset — what lives under the hood.</div>
    </div>
    <div class="topic-grid">
      <div class="topic-card">
        <h3><span class="topic-icon">🔲</span> Clean Topology & Edge Flow</h3>
        <p>Use quads wherever possible. Edge loops should follow the logical form of the object. Avoid poles (5+ edges meeting) in areas that deform or catch light badly. Triangulate only on export — never work in tris.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚙️</span> Hard Surface Modelling</h3>
        <p>Mechanical objects rely on controlled bevels, support loops, and clean boolean workflows. Know when to add geometry (for silhouette) and when to fake it (with normal maps). Boolean clean-up is a skill in itself.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">💡</span> Fixing Shading Issues</h3>
        <p>Bad shading comes from bad normals. Fix it with: correct smoothing groups / auto-smooth, weighted normals modifier, or support loops to sharpen edges. Always view your mesh with a matcap before baking.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📏</span> Scale & Proportions</h3>
        <p>Work in real-world units from the start. A door is ~2.1 m tall, a human ~1.8 m. Scale issues cause problems in physics, baking cage size, and LOD transitions. Apply scale before export.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🧩</span> Modular & Kitbash Workflows <span class="new-tag">+</span></h3>
        <p>Most game environments are built from modular pieces — walls, floors, trims — that snap together on a grid. Pivot points must be at snapping positions (corner, base centre). Kitbash sets are pre-made modules combined into new forms. This is how most game levels are built efficiently.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🔺</span> Low-Poly vs High-Poly Workflow <span class="new-tag">+</span></h3>
        <p>High-poly = no polygon limit, used only for baking. Low-poly = the game mesh, must hit polycount budget. These are two separate meshes. The high-poly detail is transferred via normal map bake — the engine never sees the high-poly.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📤</span> Triangulation on Export <span class="new-tag">+</span></h3>
        <p>Engines triangulate all quads on import — but they may do it differently than your DCC tool. To control how your quads split (especially on bevels and concave faces), triangulate manually before export. Unexpected triangulation causes shading artifacts in-engine that look fine in Blender/Maya.</p>
      </div>
    </div>
    <div class="diagram">
      <svg width="560" height="160" viewBox="0 0 560 160">
        <rect width="560" height="160" rx="12" fill="#1a1d27"/>
        <text x="140" y="24" text-anchor="middle" fill="#5dd4a4" font-size="12" font-weight="600">GOOD — Quads, clean loops</text>
        <g stroke="#5dd4a4" stroke-width="1.5" fill="none">
          <rect x="40" y="36" width="200" height="100" rx="4"/>
          <line x1="90" y1="36" x2="90" y2="136"/>
          <line x1="140" y1="36" x2="140" y2="136"/>
          <line x1="190" y1="36" x2="190" y2="136"/>
          <line x1="40" y1="69" x2="240" y2="69"/>
          <line x1="40" y1="103" x2="240" y2="103"/>
        </g>
        <text x="420" y="24" text-anchor="middle" fill="#f76a6a" font-size="12" font-weight="600">BAD — Triangles, n-gons</text>
        <g stroke="#f76a6a" stroke-width="1.5" fill="none">
          <rect x="320" y="36" width="200" height="100" rx="4"/>
          <line x1="320" y1="36" x2="520" y2="136"/>
          <line x1="370" y1="36" x2="520" y2="90"/>
          <line x1="320" y1="90" x2="440" y2="136"/>
          <line x1="420" y1="36" x2="370" y2="136"/>
          <line x1="320" y1="60" x2="490" y2="60"/>
        </g>
        <text x="280" y="90" text-anchor="middle" fill="#3a3d5e" font-size="28" font-weight="700">vs</text>
      </svg>
    </div>
    <div class="tip-box"><strong>Pivot point placement:</strong> Where you place the pivot affects everything in engine. A door's pivot = hinge edge. A crate's pivot = bottom centre. A modular wall = bottom-left corner for grid snapping. Set this before export — changing it after means reimporting everything.</div>
    <div class="warn-box"><strong>Common mistake:</strong> Adding edge loops for detail that should be in the normal map. Keep the low-poly lean — only add geometry that changes the silhouette or is visible at the intended camera distance.</div>`
  },

  // 2 — SCULPTING
  {
    nav: 'Sculpting',
    icon: '🗿',
    html: `
    <div class="slide-header">
      <div class="slide-num">02 — Sculpting</div>
      <div class="slide-title">Sculpting</div>
      <div class="slide-subtitle">From clay to game-ready detail — working in three layers of form.</div>
    </div>
    <div class="two-col-3">
      <div class="topic-card">
        <h3><span class="topic-icon">🔵</span> Primary Forms</h3>
        <p>The big silhouette read. Block-in the major masses first. If the primary form isn't right, no amount of detail will save it. Work at low subdivision or with DynaMesh — focus on overall shape and proportions.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🟡</span> Secondary Forms</h3>
        <p>Mid-level forms that break up the primary shape — muscle groups, panel placements, major surface variations. These give the form its character and realism.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🟢</span> Tertiary Forms</h3>
        <p>Fine surface detail — pores, scratches, micro-roughness. Only add these last. Most tertiary detail comes from alphas, stamps, or tileable textures overlaid in Substance — not from sculpting every pore by hand.</p>
      </div>
    </div>
    <div class="diagram">
      <svg width="560" height="130" viewBox="0 0 560 130">
        <rect width="560" height="130" rx="12" fill="#1a1d27"/>
        <polygon points="280,15 80,115 480,115" fill="none" stroke="#2a2d3e" stroke-width="1.5"/>
        <polygon points="280,15 200,65 360,65" fill="#7c6af720"/>
        <text x="280" y="50" text-anchor="middle" fill="#7c6af7" font-size="11" font-weight="600">PRIMARY</text>
        <polygon points="200,65 360,65 410,115 150,115" fill="#f7956a15"/>
        <text x="280" y="95" text-anchor="middle" fill="#f7956a" font-size="11" font-weight="600">SECONDARY</text>
        <text x="490" y="120" text-anchor="start" fill="#5dd4a4" font-size="11" font-weight="600">TERTIARY</text>
        <line x1="480" y1="115" x2="488" y2="118" stroke="#5dd4a4" stroke-width="1"/>
        <text x="20" y="28" fill="#8b8fa8" font-size="11">Build from top down.</text>
        <text x="20" y="44" fill="#8b8fa8" font-size="11">Most artists jump to</text>
        <text x="20" y="60" fill="#8b8fa8" font-size="11">detail too early.</text>
      </svg>
    </div>
    <h2 class="section-label">Tools & Workflow</h2>
    <div class="topic-grid">
      <div class="topic-card">
        <h3><span class="topic-icon">🌀</span> DynaMesh / SculptrisPro <span class="new-tag">+</span></h3>
        <p>DynaMesh (ZBrush) and SculptrisPro (Blender) constantly remesh as you sculpt — you never run out of polygons in a specific area. Use these in the blocking stage so you can freely push and pull mass without topology constraints. Switch to SubDiv levels once the primary form is locked.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📐</span> Subdivision Level Workflow <span class="new-tag">+</span></h3>
        <p>Never push detail down to a lower subdivision. Work at the lowest level that still has enough resolution for what you're doing. Lower levels = primary forms. Mid levels = secondary. Highest levels = fine tertiary. Going back and reshaping a low SubDiv level after adding high-level detail destroys your work.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🖌️</span> Alpha & Stamp Brushes <span class="new-tag">+</span></h3>
        <p>Alphas are greyscale images used as brush shapes — scratches, bolt patterns, cloth weave, skin pores. Stamps apply the alpha in a single click; drag-dot tiles it. This is how pros add tertiary detail fast without sculpting each scratch by hand. Source alphas from Substance, ArtStation Marketplace, or create your own in Photoshop.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚔️</span> ZBrush vs Blender Sculpting <span class="new-tag">+</span></h3>
        <p>ZBrush: industry standard for organic sculpting, handles hundreds of millions of polygons, best alpha/brush library, more complex UI. Blender: free, integrates directly with modelling/retopo/UV workflow, improving rapidly. Many pros use ZBrush for sculpting and Blender for everything else. Know at least one well.</p>
      </div>
    </div>
    <h2 class="section-label">Preparing for Game Pipeline</h2>
    <ul class="checklist">
      <li><strong>Retopology</strong> — Create a clean low-poly cage. Tools: RetopoFlow (Blender), ZRemesher (ZBrush), Maya Quad Draw.</li>
      <li><strong>Decimation vs. retopo</strong> — Decimated meshes are fine as the high-poly for baking, but never use them as your final game mesh.</li>
      <li><strong>Sculpt resolution</strong> — Enough geometry that the baked normal map captures all tertiary detail. Typically 5–8 million polys for a hero prop.</li>
      <li><strong>Symmetry clean-up</strong> — Apply symmetry before the final detail pass. Ensure the merge at the centre line is clean.</li>
    </ul>
    <div class="good-box"><strong>Workflow:</strong> Block with DynaMesh → Lock primary form → Switch to SubDiv → Add secondary → Add tertiary with alphas → Decimate for baking high-poly → Retopo for game low-poly.</div>`
  },

  // 3 — UV UNWRAPPING
  {
    nav: 'UV Unwrapping',
    icon: '📦',
    html: `
    <div class="slide-header">
      <div class="slide-num">03 — UV Unwrapping</div>
      <div class="slide-title">UV Unwrapping</div>
      <div class="slide-subtitle">How your 3D surface maps to 2D texture space.</div>
    </div>
    <div class="topic-grid">
      <div class="topic-card">
        <h3><span class="topic-icon">✂️</span> Clean UV Layouts</h3>
        <p>Seams should be hidden on hard edges, inside creases, or under surfaces never seen by camera. Avoid stretching — use a checker texture to verify. Keep islands axis-aligned where possible to prevent texture blurring from interpolation.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🔬</span> Texel Density</h3>
        <p>All islands on an asset should have the same texel density (pixels per meter). Hero props get more texture space than background props. Consistency prevents blurry-vs-sharp patches on the same object.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📐</span> Efficient Packing</h3>
        <p>Fill as much UV space as possible — aim for 85–95% coverage. Use auto-packers (UV Packmaster, RizomUV). Leave at least 2–4 px padding between islands at 2K to prevent mipmap bleeding.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">💡</span> Intentional UV Mirroring <span class="new-tag">+</span></h3>
        <p>Symmetrical objects can share UV space — mirror one side's UVs directly on top of the other. This effectively doubles your texel density at no cost. The trade-off: you can't paint asymmetric detail (dirt, wear on one side only). Decide per-asset whether mirroring is appropriate.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🗺️</span> UV Channel 2 — Lightmaps <span class="new-tag">+</span></h3>
        <p>Unreal Engine's static lighting requires a second UV channel with no overlapping islands and more padding (usually 4–8 px at 2K). Channel 1 = unique texture UVs (can mirror, can be packed tight). Channel 2 = lightmap UVs (no overlaps, ever). This is a separate unwrap on the same mesh. Unreal can auto-generate it but manual is almost always better.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📦</span> UDIM Workflow <span class="new-tag">+</span></h3>
        <p>UDIM extends UV space across multiple 0–1 tiles (1001, 1002…), each holding a full texture set. Standard in film and high-end game pipelines for character assets needing very high texel density. Supported in Substance Painter, ZBrush, and modern engines. Not needed for most game props — know it exists and when it's appropriate.</p>
      </div>
    </div>
    <div class="diagram">
      <svg width="560" height="200" viewBox="0 0 560 200">
        <rect width="560" height="200" rx="12" fill="#1a1d27"/>
        <rect x="30" y="20" width="160" height="160" fill="none" stroke="#2a2d3e" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="110" y="14" text-anchor="middle" fill="#f76a6a" font-size="11">BAD — wasted space, stretched</text>

    <div class="slide-header">
      <div class="slide-num">04 — Texturing (PBR)</div>
      <div class="slide-title">Texturing (PBR)</div>
      <div class="slide-subtitle">Physically Based Rendering — making materials behave like real world surfaces.</div>
    </div>
    <h2 class="section-label">Core PBR Maps</h2>
    <div class="topic-grid">
      <div class="topic-card">
        <h3><span class="topic-icon">🟤</span> Albedo / Base Color</h3>
        <p>Raw surface color with no lighting baked in. Avoid very dark (&lt;30) or pure white (&gt;240) values. Metals have coloured albedo; non-metals are grey to coloured. Never bake lighting into the albedo map.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚫</span> Metallic</h3>
        <p>Binary in most workflows — 0 (non-metal) or 1 (metal). Transitions only on oxidized or mixed surfaces. Don't use 0.5 as a general value; it breaks physically.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚪</span> Roughness</h3>
        <p>Controls how blurry reflections are. 0 = mirror, 1 = fully matte. The most expressive channel — use variation to tell the story of the surface (worn areas rougher, polished areas smoother).</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🔵</span> Normal Map</h3>
        <p>Baked from high-poly or hand-painted. Encodes surface direction. Dominant colour = 128,128,255 (flat blue). OpenGL vs DirectX: Y channel is flipped — know which your engine uses.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🌋</span> Height / Displacement <span class="new-tag">+</span></h3>
        <p>Greyscale map — white = raised, black = recessed. Used two ways: (1) tessellation in engine for actual geometry displacement, (2) parallax occlusion mapping for cheaper fake depth (grout lines, worn surfaces). In Substance, height drives cavity shading and mask generators.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">✨</span> Emissive <span class="new-tag">+</span></h3>
        <p>Adds light emission from the surface — screens, LEDs, lava, neon signs. Emissive values can exceed 1.0 (HDR) to actually bloom in post-processing. Don't fake emissive with bright albedo — it won't bloom or illuminate surroundings.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🍃</span> Opacity / Alpha <span class="new-tag">+</span></h3>
        <p>Three modes: Opaque (no alpha), Masked (hard cutout — foliage, fences, hair cards), Translucent (soft blend — glass, smoke). Masked is cheapest. Translucent is expensive — avoid on many overlapping surfaces. Alpha source is usually a separate greyscale channel or the albedo alpha.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">💎</span> Specular Workflow <span class="new-tag">+</span></h3>
        <p>Older Specular/Glossiness workflow (used in some studios and legacy engines): Diffuse map (= albedo), Specular map (reflection colour + intensity), Glossiness (= inverse roughness). Still found in Unity's Legacy shaders and some older pipelines. Know the difference — a Metallic-Roughness PBR asset imported into a Spec/Gloss shader looks completely wrong.</p>
      </div>
    </div>
    <h2 class="section-label">Trim Sheets <span class="new-tag">+</span></h2>
    <div class="topic-card" style="margin-top:0">
      <h3><span class="topic-icon">📋</span> What is a Trim Sheet?</h3>
      <p style="margin-bottom:12px">A trim sheet is a single tileable texture atlas containing many different surface trims — edges, panels, pipes, concrete bands, metal strips — all on one 2K or 4K texture. Every asset in a scene (walls, floors, props) maps its UVs to sections of the same trim sheet. This means the entire level shares one draw call for that material.</p>
      <p><strong style="color:var(--good)">Why it matters:</strong> This is how AAA game environments are built. One trim sheet can texture an entire level. The trade-off is that UV unwrapping becomes about mapping to the right strip rather than unique unwrapping. Used heavily in FPS environments (Call of Duty, Titanfall, The Last of Us).</p>
    </div>

    <h2 class="section-label">Surface Storytelling</h2>
    <ul class="checklist">
      <li><strong>Material definition first</strong> — Decide what the surface IS before adding wear. Each material has a specific roughness range and albedo value range.</li>
      <li><strong>Wear logic</strong> — Paint chips on edges and high-contact areas. Rust bleeds down from chips. Dirt accumulates in crevices (low AO), not on peaks.</li>

      <li><strong>Value contrast</strong> — Roughness variation carries most of the visual interest. Keep albedo values in a narrow range; let roughness do the heavy lifting.</li>
    </ul>

      <div class="topic-card">
        <h3><span class="topic-icon">✅</span> Clean Normal Bakes</h3>
        <p>Biggest factors: correct cage/ray distance, matching naming convention (HIGH_/LOW_ suffix), and proper smoothing groups. Harden edges on UV seams, smooth everything else before baking.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🔧</span> Fixing Errors</h3>
        <p>Seam artifacts: harden UV-seam edges. Skewing: check ray distance is not too large. Dark blotches: check for inverted normals on the high-poly. Gradient smearing: use exploded bake.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🗺️</span> Understanding Maps</h3>
        <p>Normal, AO, Curvature, Thickness, Position, World-Space Normal — each feeds different generators in Substance. Know what each one does before using it.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">💥</span> Exploded Bakes <span class="new-tag">+</span></h3>
        <p>When parts of the high-poly overlap or are very close together, rays from the low-poly hit the wrong surface and produce incorrect bakes. Solution: move the mesh parts far apart in the DCC (in a separate "exploded" scene), bake, then move them back. The UVs stay the same — only world position changes for the bake. Essential for complex mechanical props.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🪄</span> Floating Geometry <span class="new-tag">+</span></h3>
        <p>Small high-poly pieces that "float" just above the low-poly surface without being connected. Bolts, rivets, panel lines — modelled on the high-poly but not present on the low-poly at all. They bake into the normal map perfectly, contributing zero polygons to the final game mesh. One of the most powerful techniques for adding density to a low-poly.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">🧲</span> Cage vs Ray Distance <span class="new-tag">+</span></h3>
        <p>Two methods to control bake projection: (1) <strong>Cage mesh</strong> — a slightly inflated copy of the low-poly that defines exactly where rays are cast. Most accurate, fully controllable per-polygon. (2) <strong>Ray distance / max frontal/rear</strong> (Marmoset, Substance) — simpler, a single distance value. Cage = more work but fewer artifacts on complex shapes. Ray distance = faster for simple props.</p>
      </div>

        <p>Wire Albedo → Base Color, Normal → Normal (check Y flip), Roughness + Metallic → their inputs. sRGB: only on Albedo. All other maps = Linear. Wrong colour space is the #1 import mistake.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚡</span> Real-time Testing</h3>
        <p>Test with default lighting and in a dark scene (to catch emissive/self-illumination issues). Look for banding, z-fighting, and pop-in. Test at intended camera distance — what looks fine up close may look blurry from gameplay distance.</p>

        <p>Texture atlasing combines multiple objects onto one texture sheet, saving draw calls. Use power-of-2 resolutions. ORM packing: Roughness/Metallic/AO into RGB channels of one texture.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📊</span> LOD & Culling</h3>
        <p>LOD (Level of Detail): 3–4 levels, each ~50% of previous polycount. Culling: mark small objects as "cull aggressively". Instancing: repeat props share the same mesh + material.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📡</span> Draw Calls & Batching <span class="new-tag">+</span></h3>
        <p>A draw call is one command to the GPU to render a mesh. Every unique mesh+material combination = one draw call. 1000 instances of the same mesh = still one draw call (GPU instancing). One merged 100K-poly object with unique materials can cost more than 50 separate instanced props. Reducing draw calls (via instancing, atlasing, batching) is often more impactful than reducing polycount.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">📱</span> Platform Budgets <span class="new-tag">+</span></h3>
        <p>Budgets vary wildly by platform: Mobile = 50–100K tris on screen, 512px textures. Console (current gen) = 1–2M tris on screen, 4K textures. PC high-end = effectively unlimited with LODs. Always know your target platform before starting — a mobile-ready prop needs fundamental structural decisions made upfront, not as an afterthought.</p>
      </div>
      <div class="topic-card">
        <h3><span class="topic-icon">⚠️</span> Triangles vs Vertices <span class="new-tag">+</span></h3>
        <p>Engines count vertices, not triangles. A triangle with a UV seam or smoothing group break requires duplicate vertices at that edge — a 100-tri mesh with many seams can have 400 vertices. This is what the GPU actually processes. High vertex counts from excessive UV seams or smoothing splits can hurt performance more than expected from the triangle count alone.</p>
      </div>
    </div>

        <p>Shapes communicate emotion. Circles/curves = friendly, organic. Sharp triangles = danger, aggression. Rectangles = stability, industrial. Consistent shape language makes an asset read as belonging to a world.</p>

      <div class="topic-card">
        <h3><span class="topic-icon">🔍</span> Detail Hierarchy</h3>
        <p>Not all surfaces deserve equal detail. The focal area gets the most complexity. Surrounding areas get mid detail. Background surfaces stay minimal. Violating this makes everything fight for attention and nothing wins.</p>
      </div>
      <div class="topic-card">

        <p>Guide the viewer's eye with contrast (light vs dark), edge sharpness, and value grouping. A good asset has one clear "hero" area the eye naturally lands on first.</p>

        <p>The classic game art test: render your asset as a solid black silhouette on white. If you can't identify what it is or it looks boring, the primary form needs work. Strong silhouettes have distinct breakup — not a blob, not symmetric repetition. Historically, game characters were designed silhouette-first because gameplay required instant recognition at low resolution.</p>

        <p>Value grouping: cluster your lights and darks into 2–3 groups, not scattered noise. Temperature contrast: warm key light + cool fill creates depth. Complementary accents (orange highlight on blue metal) create visual pop without clashing. In 3D, color theory mostly lives in roughness variation and the lighting setup, not the albedo map.</p>

    <div class="slide-header">

      <div class="slide-subtitle">The ability to see and translate the real world into 3D.</div>
    </div>
    <div class="two-col">
      <div>
        <h2 class="section-label">Breaking Down References</h2>
        <ul class="checklist">
          <li><strong>Form</strong> — What are the primary volumes? Ignore detail, look at big shapes first.</li>
          <li><strong>Material</strong> — What is the surface made of? What is the roughness range? How does it reflect light?</li>
          <li><strong>Construction</strong> — How was this made? Welded? Cast? Carved? Construction history shows up in the surface.</li>
          <li><strong>Age & Wear</strong> — How old is it? Where has it been handled most? What environmental wear is visible?</li>
          <li><strong>Scale cues</strong> — What tells you how big this is? Fasteners, grain, human interaction marks?</li>
          <li><strong>Light source</strong> — Where is the key light in your reference? Understanding the lighting helps you separate surface colour from lighting artefacts. Don't copy the lighting baked into a photo into your albedo. <span class="new-tag">+</span></li>
        </ul>
        <h2 class="section-label">Reading Concept Art <span class="new-tag">+</span></h2>
        <ul class="checklist">
          <li><strong>2D ≠ photo</strong> — Concept art is an interpretation, not a blueprint. The designer made shortcuts. Your job is to interpret their intent in 3D, not copy every stroke literally.</li>
          <li><strong>Ask: what material IS this?</strong> — Concept art often uses stylised shading. A grey surface in concept could be painted metal, bare concrete, or rough plastic. Decide, then use photo reference for the actual surface properties.</li>
          <li><strong>Check for proportion cues</strong> — Concept art may not be to scale. Look for handles, hinges, rivets — real-world objects that tell you the true size.</li>
          <li><strong>Style vs function</strong> — Understand which elements are design choices (shape, silhouette) and which are functional (hinges, bolts, seams). Model the functional ones with real-world logic, even if the concept is loose.</li>
        </ul>
      </div>
      <div>
        <h2 class="section-label">Applying References</h2>
        <ul class="checklist">
          <li><strong>Don't copy — extract principles</strong> — Old wood reference gives you: roughness range, grain direction, colour variation, crack patterns. Apply those principles to your model.</li>
          <li><strong>Multiple references</strong> — One for overall form, one for material close-up, one for scale context, one for in-context lighting.</li>
          <li><strong>Stylised references</strong> — When working stylised, also reference the shipped game's art. Match its conventions, not just reality.</li>
          <li><strong>Check every 30 minutes</strong> — Looking at your work against reference regularly prevents drift. Without this, after 4 hours you'll have drifted far from your reference without noticing.</li>

        <h2 class="section-label">Team Roles <span class="new-tag">+</span></h2>
        <ul class="checklist">
          <li><strong>3D Artist / Prop Artist</strong> — Models, textures, and delivers individual assets to spec.</li>
          <li><strong>Environment Artist</strong> — Assembles props into levels. Works with modular kits. Focuses on composition and atmosphere.</li>
          <li><strong>Technical Artist (TA)</strong> — Bridges art and engineering. Builds shaders, tools, and pipeline. Enforces performance budgets. Your best friend when something breaks.</li>
          <li><strong>Art Lead / Art Director</strong> — Maintains visual consistency. Approves assets, gives notes. Works from an art bible / style guide.</li>
          <li><strong>Generalist</strong> — Common in smaller studios. Does everything. Breadth over depth.</li>
        </ul>
      </div>
      <div>
        <h2 class="section-label">Style Guides & Art Bibles <span class="new-tag">+</span></h2>
        <div class="topic-card">
          <h3><span class="topic-icon">📖</span> What is an Art Bible?</h3>
          <p style="margin-bottom:10px">A document (or shared folder) that defines the visual language of the project: colour palette, materials, polycount budgets per asset type, texel density standards, naming conventions, and reference images. Every asset must conform to it.</p>
          <ul class="checklist" style="margin-top:8px">
            <li><strong>You will always receive one in a studio job.</strong> Read it before touching anything. Deliver work that matches its standards.</li>
            <li><strong>For student projects</strong> — create your own mini art bible before you start. Define: max polycount, texture resolution, colour palette, 3 mood reference images. It forces design decisions upfront.</li>
            <li><strong>Deviation = rework.</strong> If you think something in the style guide is wrong, flag it to the art lead — don't silently break it.</li>
          </ul>
        </div>
        <h2 class="section-label">Debugging <span class="new-tag">+</span></h2>
        <ul class="checklist">
          <li><strong>Isolate the step</strong> — If it looks wrong in engine, verify each prior step is correct first.</li>
          <li><strong>Check transforms</strong> — Un-applied scale/rotation is responsible for the majority of "weird" import bugs.</li>
          <li><strong>Version control awareness</strong> — Studios use Perforce or Git LFS for 3D assets. Know that these exist. Never save over a file someone else is working on. "Save with new name" before destructive changes.</li>
        </ul>
      </div>
    </div>`

          <li><strong>Describe the symptom precisely</strong> — "The normal map looks wrong" is not useful. "Dark seam artifact on UV island borders in Marmoset" is actionable.</li>

          <li><strong>Isolate the step</strong> — Is it the mesh? UV? Bake settings? Import? Test each step independently.</li>
          <li><strong>Check the obvious first</strong> — Inverted normals, un-applied scale, wrong colour space, incorrect axis. These cause 80% of "mysterious" issues.</li>

// Build sidebar nav
const sidebar = document.getElementById('sidebar');
slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'nav-item' + (i === 0 ? ' active' : '');
  el.innerHTML = `<span class="nav-num">${i === 0 ? '⌂' : i}</span>${s.nav}`;
  el.onclick = () => goTo(i);
  sidebar.appendChild(el);
});

// Build slide content
const content = document.getElementById('content');
slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.id = 'slide-' + i;
  el.innerHTML = s.html;
  content.appendChild(el);
});

let current = 0;

function goTo(index) {
  if (index < 0 || index >= slides.length) return;
  document.querySelectorAll('.slide')[current].classList.remove('active');
  document.querySelectorAll('.nav-item')[current].classList.remove('active');
  current = index;
  document.querySelectorAll('.slide')[current].classList.add('active');
  document.querySelectorAll('.nav-item')[current].classList.add('active');
  document.querySelectorAll('.nav-item')[current].scrollIntoView({ block: 'nearest' });
  document.getElementById('slide-counter').textContent = `${current + 1} / ${slides.length}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / slides.length) * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;
}

function navigate(dir) { goTo(current + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
});

goTo(0);
</script>
